name: Deploy Verso Manual to GitHub Pages

on:
  push:
    branches: [ verso ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: docs/urysohn-docs/manual
          build: false
          test: false

      - name: Build manual
        working-directory: docs/urysohn-docs/manual
        run: lake exe docs

      - name: Upload manual site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/urysohn-docs/manual/_out/html-multi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
